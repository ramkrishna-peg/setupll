server:
  port: __PORT__
  address: 0.0.0.0
lavalink:
  server:
    password: __PASSWORD__
    sources:
      youtube: true
      bandcamp: false
      soundcloud: true
      twitch: false
      vimeo: false
      http: false
      local: false
    bufferDurationMs: 100
    frameBufferDurationMs: 1000
    opusEncodingQuality: 3
    resamplingQuality: LOW
    trackStuckThresholdMs: 5000
    useSeekGhosting: false
    youtubePlaylistLoadLimit: 10
    playerUpdateInterval: 10
    youtubeSearchEnabled: true
    soundcloudSearchEnabled: false
    gc-warnings: false
